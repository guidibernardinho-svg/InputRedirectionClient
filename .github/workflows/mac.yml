name: Build macOS Qt App (safe)

on:
  push:
  workflow_dispatch:

jobs:
  mac-build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt + CMake
        run: |
          brew update
          brew install qt cmake

      - name: Setup Qt path
        run: echo "/opt/homebrew/opt/qt/bin" >> $GITHUB_PATH

      - name: Verify Qt
        run: |
          qmake -v || true

      # ===== CONFIGURE =====
      - name: Configure project (CMake)
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_PREFIX_PATH=/opt/homebrew/opt/qt

      # ===== BUILD (sem "build project" direto) =====
      - name: Compile
        run: |
          cd build
          cmake --build . --parallel

      # ===== FIND EXECUTABLE AUTOMATICALLY =====
      - name: Locate binary
        run: |
          find build -type f -perm +111 -print

      # ===== CREATE APP =====
      - name: Create .app
        run: |
          mkdir -p InputRedirection.app/Contents/MacOS
          BIN=$(find build -type f -perm +111 | head -n 1)
          cp "$BIN" InputRedirection.app/Contents/MacOS/

      # ===== DEPLOY QT =====
      - name: macdeployqt
        run: |
          macdeployqt InputRedirection.app || true

      # ===== ZIP =====
      - name: Package
        run: |
          zip -r InputRedirection-mac.zip InputRedirection.app

      # ===== UPLOAD =====
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: InputRedirection-mac.zip
